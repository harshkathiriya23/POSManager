{% extends "layouts/app.html" %}

{% block content %}
<div class="card" style="max-width:560px;">
  <h1 class="h1">Complete Your Profile</h1>
  <p class="text-muted">Please fill in your details before accessing the software.</p>
  {% if errors %}
    <div class="alert alert-error">Please correct the errors below.</div>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="name">Full Name</label>
      <input class="form-control" type="text" id="name" name="name" value="{{ user.name }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-control" type="email" id="email" name="email" value="{{ user.email }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="mobile_number">Mobile Number</label>
      <input class="form-control" type="tel" id="mobile_number" name="mobile_number" value="{{ user.mobile_number }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="alternative_contact_number">Alternative Contact</label>
      <input class="form-control" type="tel" id="alternative_contact_number" name="alternative_contact_number"
             value="{{ user.alternative_contact_number|default:'' }}">
    </div>
    <div class="form-group">
      <label class="form-label" for="address">Address</label>
      <textarea class="form-control" id="address" name="address" rows="3" required>{{ user.address|default:'' }}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label" for="profile_picture">Profile Picture</label>
      <input class="form-control" type="file" id="profile_picture" name="profile_picture" accept="image/*">
    </div>
    <button type="submit" class="btn btn-primary">Save & Continue</button>
  </form>
</div>
{% endblock %}
