{% extends "base.html" %}
{% load static %}

{% block title %}Login — FMCG POS{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-bg" aria-hidden="true">
    <span class="shape circle"></span>
    <span class="shape"></span>
    <span class="shape circle"></span>
    <span class="shape"></span>
    <span class="shape"></span>
    <span class="shape circle"></span>
    <span class="shape"></span>
    <span class="shape circle"></span>
  </div>

  <div class="card auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">FMCG</div>
      <h1 class="h1" style="margin-bottom:4px;color:#000;">FMCG POS</h1>
      <p class="auth-subtitle">Log in to your account to continue.</p>
    </div>
    {% if messages %}
      <div class="flash-messages" role="status" aria-live="polite">
        {% for message in messages %}
          <div class="alert alert-error alert-flash" data-auto-dismiss="true">
            <span class="alert-text">{{ message }}</span>
            <button type="button" class="alert-close" aria-label="Dismiss">&times;</button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="personID">Person ID</label>
        <input class="form-control" type="text" id="personID" name="personID" required autofocus placeholder="person id">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" required placeholder="password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px;">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
